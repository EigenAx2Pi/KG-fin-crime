name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff pytest
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Static invariants (no DB required)
        # These guard the Pillar-1 discipline boundary. Failing here means a
        # graph-native detector grew a label dependency.
        run: pytest tests/ -m static -v

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit
